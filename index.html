<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Circle Tap Challenge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="background-canvas"></canvas>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="ui-container">
            <div id="difficulty-indicator" data-difficulty="easy" title="Difficulty: Easy">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
            <div id="score-display" class="hidden">Score: <span id="score">0</span></div>
            <div id="level-display" class="hidden">1</div>
            
            <div id="start-menu">
                <h1 class="title-large">Circle Tap</h1>
                <div id="tap-to-start" class="blink">Tap to Start</div>
                <div class="difficulty-selector" id="start-difficulty-selector">
                    <button class="diff-btn active" data-difficulty="easy">
                        <div class="diff-icon"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
                        <span>Easy</span>
                    </button>
                    <button class="diff-btn" data-difficulty="medium">
                        <div class="diff-icon"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
                        <span>Med</span>
                    </button>
                    <button class="diff-btn" data-difficulty="hard">
                        <div class="diff-icon"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
                        <span>Hard</span>
                    </button>
                </div>
            </div>

            <div id="game-over-menu" class="hidden">
                <h2>Game Over</h2>
                <p>Final Score: <span id="final-score">0</span></p>
                
                <div class="difficulty-selector" id="game-over-difficulty-selector">
                    <button class="diff-btn active" data-difficulty="easy">
                        <div class="diff-icon"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
                        <span>Easy</span>
                    </button>
                    <button class="diff-btn" data-difficulty="medium">
                        <div class="diff-icon"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
                        <span>Med</span>
                    </button>
                    <button class="diff-btn" data-difficulty="hard">
                        <div class="diff-icon"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
                        <span>Hard</span>
                    </button>
                </div>

                <div id="game-over-buttons">
                  <button id="home-btn" class="menu-btn" aria-label="Back to Home">
                      <svg viewBox="0 0 24 24" fill="currentColor">
                          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8h5z"></path>
                      </svg>
                  </button>
                  <button id="leaderboard-btn" class="menu-btn" aria-label="Leaderboard">
                      <svg viewBox="0 0 24 24" fill="currentColor">
                          <path d="M3 13h3v7H3v-7zm5-2h3v9H8v-9zm5-6h3v15h-3V5z"></path>
                      </svg>
                  </button>
                  <button id="submit-score-btn" class="menu-btn">To Submit</button>
                  <button id="replay-btn" class="menu-btn">Instant Replay</button>
                  <button id="restart-btn" class="menu-btn">Retry</button>
                </div>
            </div>
        </div>
    </div>
    <div id="replay-container" class="hidden">
        <div id="player-root"></div>
        <button id="close-replay-btn" aria-label="Close replay">&times;</button>
    </div>
    <div id="leaderboard-view" class="hidden">
        <button id="close-leaderboard-btn" aria-label="Close Leaderboard">&times;</button>
        <h2>Leaderboard</h2>
        <div id="leaderboard-difficulty-filters">
            <button class="leaderboard-filter-btn active" data-difficulty="easy">Easy</button>
            <button class="leaderboard-filter-btn" data-difficulty="medium">Medium</button>
            <button class="leaderboard-filter-btn" data-difficulty="hard">Hard</button>
            <button id="my-scores-btn" class="leaderboard-filter-btn" data-difficulty="mine">My Scores</button>
        </div>
        <div id="leaderboard-list">
            <!-- Scores will be populated here -->
        </div>
        <div id="leaderboard-pagination" class="hidden">
            <!-- Pagination controls will be populated here -->
        </div>
    </div>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1?dev",
        "react-dom": "https://esm.sh/react-dom@18.3.1?dev",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?dev",
        "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime?dev",
        "react/jsx-dev-runtime": "https://esm.sh/react@18.3.1/jsx-dev-runtime?dev",
        "remotion": "https://esm.sh/remotion@4.0.350?external=react,react-dom&dev",
        "@remotion/player": "https://esm.sh/@remotion/player@4.0.350?external=react,react-dom&dev",
        "@websim/remotion/player": "https://esm.websim.com/@websim/remotion/player",
        "marked": "https://cdn.jsdelivr.net/npm/marked/lib/marked.esm.js",
        "dompurify": "https://cdn.jsdelivr.net/npm/dompurify/dist/purify.es.min.js",
        "d3-color": "https://esm.sh/d3-color@3.1.0",
        "three": "https://esm.sh/three"
      }
    }
    </script>
    <script type="module" src="background.js"></script>
    <script type="module" src="utils.js"></script>
    <script type="module" src="audio.js"></script>
    <script type="module" src="game.js"></script>
    <script type="module" src="leaderboard.js"></script>
    <script type="module" src="replay.js"></script>
    <script type="module" src="ui.js"></script>
    <script type="module" src="script.js"></script>
    <script type="module" src="main.jsx"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
